  <script>
    (function protectWelcomeRoute() {
      const clearAndRedirect = () => {
        localStorage.removeItem("nnrg_student");
        window.location.replace("login.html");
      };

      window.nnrgRouteGuardReady = (async () => {
        try {
          const student = JSON.parse(localStorage.getItem("nnrg_student") || "null");
          const rollNumber = student?.roll_number || student?.roll;
          if (!student || !rollNumber) {
            clearAndRedirect();
            return;
          }

          document.documentElement.classList.add("welcome-authenticated");

          if (!window.supabase) {
            clearAndRedirect();
            return;
          }

          const guardClient = window.supabase.createClient(
            "https://ldmpntlouqaynldqklse.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkbXBudGxvdXFheW5sZHFrbHNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMzY4MzEsImV4cCI6MjA5MjYxMjgzMX0.axpvrV34kOgnezZ1sQXn54cQbg5XSBblQw6Gt0sWQd8"
          );
          const { data, error } = await guardClient.auth.getSession();
          if (error || !data.session) {
            clearAndRedirect();
            return;
          }

          const { data: profileRows, error: profileError } = await guardClient
            .rpc("student_login_by_roll", { p_roll_number: rollNumber });
          const profile = Array.isArray(profileRows) ? profileRows[0] : profileRows;
          const sessionEmail = String(data.session.user.email || "").trim().toLowerCase();
          const profileEmail = String(profile?.email || "").trim().toLowerCase();
          if (profileError || !profile || !profileEmail || profileEmail !== sessionEmail) {
            clearAndRedirect();
            return;
          }

          localStorage.setItem("nnrg_student", JSON.stringify({
            id: profile.id || null,
            name: profile.name,
            roll_number: profile.roll_number,
            department: profile.department,
            year: profile.year || "Student"
          }));
        } catch (error) {
          clearAndRedirect();
        }
      })();
    })();
  </script>

  <script>
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    let width = 0;
    let height = 0;
    let particles = [];

    function resizeCanvas() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    function createParticle() {
      return {
        x: Math.random() * width,
        y: Math.random() * height + height * 0.18,
        size: Math.random() * 1.35 + 0.35,
        speedY: -(Math.random() * 0.38 + 0.12),
        speedX: (Math.random() - 0.5) * 0.22,
        opacity: Math.random() * 0.55 + 0.12
      };
    }

    function seedParticles() {
      particles = [];
      for (let i = 0; i < 58; i += 1) {
        const particle = createParticle();
        particle.y = Math.random() * height;
        particles.push(particle);
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, width, height);
      particles.forEach((particle, index) => {
        particle.y += particle.speedY;
        particle.x += particle.speedX;
        particle.opacity -= 0.0009;
        if (particle.y < -10 || particle.opacity <= 0) {
          particles[index] = createParticle();
          return;
        }

        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(201, 168, 76, ${particle.opacity})`;
        ctx.fill();
      });

      if (Math.random() < 0.07) particles.push(createParticle());
      if (particles.length > 96) particles.shift();
      requestAnimationFrame(animateParticles);
    }

    resizeCanvas();
    seedParticles();
    animateParticles();

    window.addEventListener("resize", () => {
      resizeCanvas();
      seedParticles();
    });
  </script>
</body>
</html>
