  <script>
    (function protectPortalRoute() {
      const clearAndRedirect = () => {
        localStorage.removeItem("nnrg_student");
        window.location.replace("login.html");
      };

      window.nnrgRouteGuardReady = (async () => {
        try {
          const student = JSON.parse(localStorage.getItem("nnrg_student") || "null");
          if (!student || !window.supabase) {
            clearAndRedirect();
            return;
          }

          const guardClient = window.supabase.createClient(
            "https://ldmpntlouqaynldqklse.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkbXBudGxvdXFheW5sZHFrbHNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMzY4MzEsImV4cCI6MjA5MjYxMjgzMX0.axpvrV34kOgnezZ1sQXn54cQbg5XSBblQw6Gt0sWQd8"
          );
          const { data, error } = await guardClient.auth.getSession();
          if (error || !data.session) {
            clearAndRedirect();
            return;
          }

          const rollNumber = student.roll_number || student.roll;
          if (!rollNumber) {
            clearAndRedirect();
            return;
          }

          const { data: profileRows, error: profileError } = await guardClient
            .rpc("student_login_by_roll", { p_roll_number: rollNumber });
          const profile = Array.isArray(profileRows) ? profileRows[0] : profileRows;
          const sessionEmail = String(data.session.user.email || "").trim().toLowerCase();
          const profileEmail = String(profile?.email || "").trim().toLowerCase();
          if (profileError || !profile || !profileEmail || profileEmail !== sessionEmail) {
            clearAndRedirect();
            return;
          }

          localStorage.setItem("nnrg_student", JSON.stringify({
            id: profile.id || null,
            name: profile.name,
            roll_number: profile.roll_number,
            department: profile.department,
            year: profile.year || "Student"
          }));

          document.documentElement.classList.add("portal-authenticated");
        } catch (error) {
          clearAndRedirect();
        }
      })();
    })();
  </script>

    html:not(.portal-authenticated) body {
      visibility: hidden;
    }

    function pythonSubtopicFromRow(row, topic) {
      const [number, title, definition, why, difficulty, lab] = row;
      return {
        number,
        title,
        definition,
        why,
        difficulty,
        lab,
        exam: topic.exam,
        code: pythonExamples[number],
        theory: [
          `${title} belongs to ${topic.title}. Understand the meaning first, then read the syntax, then run the short example until the output feels obvious.`,
          `Compared with C, Python removes a lot of manual setup such as type declarations, braces, and memory management. That makes it excellent for AI/ML experiments, but indentation and data types still need discipline.`,
          `For JNTUH answers, write the definition, mention the important functions or syntax, connect it to one lab program, and include a small example with output.`
        ],
        mistakes: [
          "Forgetting that indentation is syntax in Python.",
          "Using C-style symbols such as &&, ||, !, braces, or semicolons in Python answers.",
          "Forgetting that input() returns a string until it is converted.",
          "Memorising the code without tracing the output line by line."
        ],
        revision: [
          "Write the one-line definition first.",
          "Remember the exact Python syntax.",
          "Know one brief example and expected output.",
          "Connect the concept to one AI/ML use case.",
          "Mention the lab program where it appears."
        ],
        readTime: difficulty === "Advanced" ? 28 : difficulty === "Intermediate" ? 22 : 16
      };
    }

    function sqlCode(title, lines, output) {
      return [
        `-- Program: ${title}`,
        `-- DBMS/SQL example for JNTUH CSE AI & ML students`,
        `-- Works in MySQL with small syntax changes for Oracle where noted.`,
        ...lines,
        ``,
        `/*`,
        `RESULT TABLE:`,
        ...output,
        `*/`
      ].join("\n");
    }

    function sqlExample(number, title) {
      const examples = {
        "4.2": sqlCode("CREATE TABLE with constraints", [
          `CREATE TABLE Department (`,
          `    dept_id INT PRIMARY KEY, -- Each department gets a unique id.`,
          `    dept_name VARCHAR(50) NOT NULL UNIQUE -- Department name cannot repeat.`,
          `);`,
          ``,
          `CREATE TABLE Student (`,
          `    roll_no INT PRIMARY KEY, -- Entity integrity: primary key cannot be NULL.`,
          `    name VARCHAR(80) NOT NULL, -- Student name is mandatory.`,
          `    age INT CHECK (age BETWEEN 17 AND 30), -- Business rule for valid age.`,
          `    dept_id INT, -- Stores matching department id.`,
          `    FOREIGN KEY (dept_id) REFERENCES Department(dept_id) -- Referential integrity.`,
          `);`,
          ``,
          `INSERT INTO Department VALUES (1, 'AI & ML');`,
          `INSERT INTO Student VALUES (101, 'Abhinay', 19, 1);`,
          `SELECT roll_no, name, age, dept_id FROM Student;`
        ], ["roll_no | name    | age | dept_id", "101     | Abhinay | 19  | 1"]),
        "5.3": sqlCode("GROUP BY and HAVING", [
          `CREATE TABLE Employee (emp_id INT PRIMARY KEY, name VARCHAR(40), dept_name VARCHAR(30), salary INT);`,
          `INSERT INTO Employee VALUES (1, 'Asha', 'AI & ML', 72000);`,
          `INSERT INTO Employee VALUES (2, 'Ravi', 'AI & ML', 68000);`,
          `INSERT INTO Employee VALUES (3, 'Sai', 'CSE', 48000);`,
          `INSERT INTO Employee VALUES (4, 'Maya', 'CSE', 62000);`,
          ``,
          `-- WHERE filters rows before grouping; HAVING filters groups after grouping.`,
          `SELECT dept_name, COUNT(*) AS total_employees, AVG(salary) AS avg_salary`,
          `FROM Employee`,
          `GROUP BY dept_name`,
          `HAVING AVG(salary) > 50000`,
          `ORDER BY avg_salary DESC;`
        ], ["dept_name | total_employees | avg_salary", "AI & ML   | 2               | 70000.00", "CSE       | 2               | 55000.00"]),
        "6.1": sqlCode("INNER JOIN and LEFT JOIN", [
          `CREATE TABLE Department (dept_id INT PRIMARY KEY, dept_name VARCHAR(30));`,
          `CREATE TABLE Student (roll_no INT PRIMARY KEY, name VARCHAR(40), dept_id INT);`,
          `INSERT INTO Department VALUES (1, 'AI & ML'), (2, 'CSE');`,
          `INSERT INTO Student VALUES (101, 'Abhinay', 1), (102, 'Sai', NULL);`,
          ``,
          `-- LEFT JOIN keeps every student even when department is missing.`,
          `SELECT s.roll_no, s.name, d.dept_name`,
          `FROM Student s`,
          `LEFT JOIN Department d ON s.dept_id = d.dept_id;`
        ], ["roll_no | name    | dept_name", "101     | Abhinay | AI & ML", "102     | Sai     | NULL"]),
        "6.2": sqlCode("Second highest salary subquery", [
          `CREATE TABLE Employee (emp_id INT PRIMARY KEY, name VARCHAR(40), salary INT);`,
          `INSERT INTO Employee VALUES (1, 'Asha', 90000), (2, 'Ravi', 76000), (3, 'Sai', 83000);`,
          ``,
          `-- Inner query finds highest salary; outer query finds highest below it.`,
          `SELECT MAX(salary) AS second_highest_salary`,
          `FROM Employee`,
          `WHERE salary < (SELECT MAX(salary) FROM Employee);`
        ], ["second_highest_salary", "83000"]),
        "7.1": sqlCode("PL/SQL block structure", [
          `-- Oracle PL/SQL anonymous block.`,
          `DECLARE`,
          `    student_marks NUMBER := 86; -- Variable declaration.`,
          `    student_grade VARCHAR2(10); -- Variable to store result.`,
          `BEGIN`,
          `    IF student_marks >= 75 THEN`,
          `        student_grade := 'Distinction';`,
          `    ELSE`,
          `        student_grade := 'Pass';`,
          `    END IF;`,
          `    DBMS_OUTPUT.PUT_LINE('Grade: ' || student_grade);`,
          `END;`,
          `/`
        ], ["Grade: Distinction"]),
        "7.3": sqlCode("Trigger to log salary changes", [
          `CREATE TABLE Salary_Log (emp_id INT, old_salary INT, new_salary INT, changed_on DATE);`,
          ``,
          `-- Oracle PL/SQL trigger. In MySQL use DELIMITER and OLD/NEW without colon.`,
          `CREATE OR REPLACE TRIGGER salary_audit_trigger`,
          `AFTER UPDATE OF salary ON Employee`,
          `FOR EACH ROW`,
          `BEGIN`,
          `    INSERT INTO Salary_Log(emp_id, old_salary, new_salary, changed_on)`,
          `    VALUES (:OLD.emp_id, :OLD.salary, :NEW.salary, SYSDATE);`,
          `END;`,
          `/`
        ], ["A log row is inserted whenever Employee.salary changes."]),
        "8.4": sqlCode("2NF decomposition", [
          `-- Original table has composite key (student_id, course_id).`,
          `-- student_name depends only on student_id, and course_name depends only on course_id.`,
          `CREATE TABLE Student (student_id INT PRIMARY KEY, student_name VARCHAR(40));`,
          `CREATE TABLE Course (course_id VARCHAR(10) PRIMARY KEY, course_name VARCHAR(40));`,
          `CREATE TABLE Enrollment (student_id INT, course_id VARCHAR(10), PRIMARY KEY(student_id, course_id));`,
          `INSERT INTO Student VALUES (101, 'Abhinay'), (102, 'Sai');`,
          `INSERT INTO Course VALUES ('CS101', 'C Prog'), ('CS102', 'Python');`,
          `INSERT INTO Enrollment VALUES (101, 'CS101'), (101, 'CS102'), (102, 'CS101');`,
          `SELECT s.student_name, c.course_name FROM Enrollment e`,
          `JOIN Student s ON e.student_id = s.student_id`,
          `JOIN Course c ON e.course_id = c.course_id;`
        ], ["student_name | course_name", "Abhinay      | C Prog", "Abhinay      | Python", "Sai          | C Prog"]),
        "10.4": sqlCode("SQL data for ML pipeline", [
          `CREATE TABLE StudentPlacement (student_id INT PRIMARY KEY, age INT, gpa FLOAT, attendance FLOAT, placed INT);`,
          `INSERT INTO StudentPlacement VALUES (1, 20, 8.7, 92.5, 1), (2, 21, 6.2, 71.0, 0);`,
          ``,
          `-- SQL filters clean labeled rows before Python/Pandas loads them for ML.`,
          `SELECT age, gpa, attendance, placed`,
          `FROM StudentPlacement`,
          `WHERE placed IS NOT NULL AND gpa > 0`,
          `ORDER BY student_id;`
        ], ["age | gpa | attendance | placed", "20  | 8.7 | 92.5       | 1", "21  | 6.2 | 71.0       | 0"])
      };

      if (examples[number]) return examples[number];

      return sqlCode(title, [
        `CREATE TABLE Student (`,
        `    roll_no INT PRIMARY KEY, -- Unique student id.`,
        `    name VARCHAR(50) NOT NULL, -- Student name.`,
        `    dept VARCHAR(30), -- Department name.`,
        `    marks INT CHECK (marks BETWEEN 0 AND 100) -- Valid marks only.`,

        `INSERT INTO Student VALUES (103, 'Maya', 'AI & ML', 86);`,

        `-- This query gives a small practical view of: ${title}.`,
        `SELECT roll_no, name, dept, marks`,

        `ORDER BY marks DESC;`

    }

    function sqlSubtopicFromRow(row, topic) {
      const [number, title, definition, why, difficulty, lab] = row;
      return {
        number,
        title,
        definition,
        why,
        difficulty,
        lab,
        exam: topic.exam,
        code: sqlExample(number, title),
        theory: [
          `${title} belongs to ${topic.title}. Start with the definition, then understand the database rule, then connect it to one SQL query or diagram.`,
          `For SQL topics, remember the clause order: SELECT, FROM, WHERE, GROUP BY, HAVING, ORDER BY. For DDL, always define keys and constraints clearly.`,
          `For JNTUH theory, write the clean definition first, then syntax or diagram rules, then a small table-based example with expected result. For normalization, show original table, dependency, and decomposed tables step by step.`
        ],
        mistakes: [
          "Writing SELECT clauses in the wrong order or placing WHERE after GROUP BY.",
          "Forgetting PRIMARY KEY, FOREIGN KEY, or CHECK constraints in schema questions.",
          "Using UPDATE or DELETE without WHERE in lab programs.",
          "Confusing WHERE with HAVING, or INNER JOIN with LEFT JOIN.",
          "For normalization, writing only theory without before-and-after tables."
        ],
        revision: [
          "DBMS reduces redundancy, inconsistency, and security problems.",
          "Primary key identifies rows; foreign key connects tables.",
          "SQL categories: DDL, DML, DQL, DCL, TCL.",
          "Clause order: SELECT, FROM, WHERE, GROUP BY, HAVING, ORDER BY.",
          "WHERE filters rows; HAVING filters groups.",
          "JOIN combines related tables.",
          "1NF: atomic values only.",

    function cppCode(title, lines, output) {

        `/*`,
        `OUTPUT:`,

        `*/`
      ].join("\n");
    }

    function cppSubtopicFromRow(row, topic) {
      const [number, title, definition, why, difficulty, lab] = row;
      return {
        number,
        title,
        definition,
        why,
        difficulty,
        lab,
        exam: topic.exam,
        code: cppExample(number, title),
        theory: [
          `${title} belongs to ${topic.title}. First connect it to what you already know from C, then learn the C++ keyword or syntax, then practice with a class-based program.`,
          `In C you usually separate structs and functions. In C++, classes, constructors, destructors, inheritance, templates, exceptions, streams, and STL let you write safer reusable code while keeping compiled performance.`,
          `For JNTUH answers, write the definition, syntax, one diagram or comparison where useful, and one complete program with output. For OOP topics, mention encapsulation, abstraction, inheritance, polymorphism, or dynamic binding when relevant.`
        ],
        mistakes: [
          "Forgetting the semicolon after a class definition.",
          "Making data public when the question expects private data plus public methods.",
          "Using new without delete, or returning reference to a local object.",
          "Forgetting const reference parameters in operators and copy constructors.",
          "Confusing compile-time polymorphism with runtime polymorphism."
        ],
        revision: [
          "C++ class = C struct plus functions plus access control.",
          "private is default inside class; public is required for outside access.",
          "Constructor initializes; destructor cleans up.",
          "new/delete call constructors/destructors; malloc/free do not.",
          "Operator overloading is compile-time polymorphism.",
          "Base constructor runs before derived constructor.",
          "virtual enables runtime polymorphism through base pointer/reference.",
          "Pure virtual function makes an abstract class.",
          "Templates give generic code with compile-time type safety.",
          "STL = containers + algorithms + iterators."
        ],
        readTime: difficulty === "Advanced" ? 32 : difficulty === "Intermediate" ? 25 : 18
      };
    }

    async function loadNoticeBoard() {
      if (!noticeState.loaded && hydrateNoticeStateFromCache()) {
        const cachedBoard = document.getElementById("noticeBoard");
        if (cachedBoard) cachedBoard.outerHTML = noticeBoardTemplate();
      }

      try {
        const now = new Date().toISOString();
        const { data, error } = await supabaseClient
          .from("portal_notices")
          .select("id,title,body,link_url,link_label,priority,expires_at,created_at")
          .eq("is_published", true)
          .or(`expires_at.is.null,expires_at.gte.${now}`)
          .order("priority", { ascending: false })
          .order("created_at", { ascending: false })
          .limit(4);
        if (error) throw error;
        noticeState.items = data || [];
        noticeState.loaded = true;
        noticeState.error = "";
        writePortalCache(NOTICE_CACHE_KEY, noticeState.items, 2 * 60 * 1000);
      } catch (error) {
        hydrateNoticeStateFromCache();
        if (!noticeState.loaded) {
          noticeState.items = [];
          noticeState.loaded = true;
        }
        noticeState.error = "Notice board setup pending.";
      }
      const board = document.getElementById("noticeBoard");
      if (board) board.outerHTML = noticeBoardTemplate();
    }

    async function loadStudyMaterials() {
      try {
        const { data: settingRows } = await supabaseClient
          .from("portal_settings")
          .select("setting_value")
          .eq("setting_key", "study_material")
          .limit(1);
        const setting = settingRows?.[0]?.setting_value || {};
        studyState.maintenance = Boolean(setting.maintenance);
        studyState.maintenanceMessage = setting.message || studyState.maintenanceMessage;

        if (studyState.maintenance) {
          studyState.materials = [];
          writePortalCache(STUDY_CACHE_KEY, {
            materials: studyState.materials,
            maintenance: studyState.maintenance,
            maintenanceMessage: studyState.maintenanceMessage
          }, STUDY_CACHE_TTL);
          return;
        }

        const cached = readPortalCache(STUDY_CACHE_KEY);
        if (cached && !cached.maintenance) {
          Object.assign(studyState, cached, {
            maintenance: false,
            maintenanceMessage: studyState.maintenanceMessage
          });
          return;
        }

        const { data, error } = await supabaseClient
          .from("study_materials")
          .select("id,language_id,title,description,resource_url,resource_type,unit_no,year,is_published,created_at,mcq_languages(name)")
          .eq("is_published", true)
          .order("created_at", { ascending: false });
        if (error) throw error;
        studyState.materials = (data || []).map(item => ({
          ...item,
          language_name: item.mcq_languages?.name || item.language_id || "General"
        }));
        writePortalCache(STUDY_CACHE_KEY, {
          materials: studyState.materials,
          maintenance: studyState.maintenance,
          maintenanceMessage: studyState.maintenanceMessage
        }, STUDY_CACHE_TTL);
      } catch (error) {
        studyState.materials = [];
      } finally {
        studyState.loaded = true;
        if (location.hash.replace("#", "") === "study") {
          content.innerHTML = `${studyTemplate()}${sectionFooterTemplate()}`;
          initStudyView();
        }
      }
    }

    function yearLabel(year) {
      const value = String(year || "").trim().toLowerCase();
      if (!value) return "Student";
      if (value.includes("year")) return value.replace(/\b\w/g, letter => letter.toUpperCase());
      const clean = value.replace(/[^0-9]/g, "");
      if (clean === "1") return "1st Year";
      if (clean === "2") return "2nd Year";
      if (clean === "3") return "3rd Year";
      if (clean === "4") return "4th Year";
      return String(year);
    }

      return { subjects: subjects.size, years: years.size, hasFourth };

    async function initMcqView() {
      await Promise.all([
        loadMcqLanguages(),
        loadFacultyTests({ force: true })
      ]);
    }

    async function loadMcqLanguages() {
      const cached = readPortalCache(MCQ_LANGUAGES_CACHE_KEY);
      if (cached?.length) {
        mcqLanguages = cached;
        if (mcqState.screen === "languages") renderMcqView();
      }

      const [{ data, error }, { data: tests, error: testsError }] = await Promise.all([
        supabaseClient
        .from("mcq_languages")
        .select("id,name,short_name,icon,display_order,is_active")
        .eq("is_active", true)
        .order("display_order", { ascending: true }),
        supabaseClient
          .from("mcq_tests")
          .select("language_id")
          .eq("is_published", true)
      ]);
      if (!error && data?.length) {
        const publishedLanguageIds = new Set((testsError ? [] : tests || []).map(test => test.language_id).filter(Boolean));
        mcqLanguages = data
          .filter(language => publishedLanguageIds.has(language.id))
          .map(normalizeMcqLanguage);
        writePortalCache(MCQ_LANGUAGES_CACHE_KEY, mcqLanguages, MCQ_LIVE_CACHE_TTL);
        if (mcqState.screen === "languages") renderMcqView();
      }
    }

    async function loadFacultyTests({ force = false } = {}) {
      const cached = force ? null : readPortalCache(MCQ_FACULTY_TESTS_CACHE_KEY);
      if (cached) {
        mcqState.facultyTests = cached;
        renderMcqView();
        return;
      }

      mcqState.loading = true;
      mcqState.error = "";
      renderMcqView();
      const { data, error } = await supabaseClient
        .from("mcq_tests")
        .select("*")
        .eq("test_type", "faculty")
        .eq("is_published", true)
        .order("created_at", { ascending: false })
        .limit(12);
      mcqState.loading = false;
      if (error) {
        mcqState.error = "MCQ tables are not ready in Supabase yet. Run the updated setup SQL first.";
      } else {
        mcqState.facultyTests = data || [];
        writePortalCache(MCQ_FACULTY_TESTS_CACHE_KEY, mcqState.facultyTests, MCQ_LIVE_CACHE_TTL);
      }
      renderMcqView();
    }

    function renderMcqView() {
      content.innerHTML = `${mcqTemplate()}${sectionFooterTemplate()}`;
    }

    async function openMcqLanguage(languageId) {
      mcqState.screen = "units";
      mcqState.languageId = languageId;
      mcqState.result = null;
      mcqState.questions = [];
      mcqState.answers = {};
      renderMcqView();
    }

    async function loadMcqQuestions({ languageId, unitNo = 0, mode = "unit", testId = "" }) {
      mcqState.screen = "test";
      mcqState.languageId = languageId || mcqState.languageId;
      mcqState.unitNo = unitNo;
      mcqState.mode = mode;
      mcqState.testId = testId;
      mcqState.loading = true;
      mcqState.error = "";
      mcqState.result = null;
      mcqState.questions = [];
      mcqState.answers = {};
      mcqState.activeQuestion = 0;
      renderMcqView();

      try {
        const cacheKey = `nnrg_mcq_questions_v1_${mode}_${mcqState.languageId || "all"}_${unitNo || "all"}_${testId || "none"}`;
        const cachedQuestions = readPortalCache(cacheKey);
        if (cachedQuestions?.length) {
          mcqState.questions = cachedQuestions;
          return;
        }

        let data = [];
        const { data: bundled, error: bundleError } = await supabaseClient
          .rpc("mcq_get_test_bundle", {
            p_language_id: mcqState.languageId,
            p_assessment_type: mode,
            p_unit_no: unitNo || null,
            p_test_id: mode === "faculty" ? testId : null
          });

        if (!bundleError) {
          data = bundled || [];
        } else {
          let testIds = [];
          if (mode === "faculty") {
            testIds = [testId];
          } else {
            let query = supabaseClient
              .from("mcq_tests")
              .select("id,unit_no,test_name")
              .eq("language_id", mcqState.languageId)
              .eq("test_type", "unit")
              .eq("is_published", true);
            if (mode === "unit") query = query.eq("unit_no", unitNo).limit(1);
            const { data: tests, error: testError } = await query.order("unit_no", { ascending: true });
            if (testError) throw testError;
            testIds = (tests || []).map(test => test.id);
          }

          if (!testIds.length) {
            mcqState.loading = false;
            renderMcqView();
            return;
          }

          const { data: fallbackQuestions, error } = await supabaseClient
            .rpc("mcq_get_questions", { p_test_ids: testIds });
          if (error) throw error;
          data = fallbackQuestions || [];
        }

        mcqState.questions = (data || []).sort((a, b) => {
          const unitA = a.unit_no || 0;
          const unitB = b.unit_no || 0;
          return unitA === unitB ? a.question_no - b.question_no : unitA - unitB;
        });
        writePortalCache(cacheKey, mcqState.questions, MCQ_QUESTION_CACHE_TTL);
      } catch (error) {
        mcqState.error = "Could not load MCQs. Run Supabase MCQ setup and insert questions first.";
      } finally {
        mcqState.loading = false;
        renderMcqView();
      }
    }

    async function submitMcqAttempt() {
      const total = mcqState.questions.length;
      if (!total) return;
      mcqState.loading = true;
      renderMcqView();
      try {
        const payload = mcqState.questions.map(question => ({
          question_id: question.id,
          selected_option: mcqState.answers[question.id] || ""
        }));
        const { data, error } = await supabaseClient
          .rpc("mcq_submit_attempt", {
            p_student_id: studentProfile?.id || null,
            p_language_id: mcqState.languageId,
            p_test_id: mcqState.mode === "faculty" ? mcqState.testId : null,
            p_assessment_type: mcqState.mode,
            p_unit_no: mcqState.unitNo || null,
            p_answers: payload
          });
        if (error || !data?.length) throw error || new Error("Attempt was not saved.");
        const result = data[0];
        mcqState.result = {
          score: Number(result.score || 0),
          total: Number(result.total_questions || total),
          attempted: payload.filter(answer => answer.selected_option).length,
          percentage: Number(result.percentage || 0)
        };
      } catch (error) {
        console.error("MCQ submit error", error);
        const detail = error?.message || error?.details || "Unknown Supabase error";
        mcqState.error = `Could not submit this attempt. ${detail}`;
        showToastPop("MCQ submit failed. Check the message on screen.");
      } finally {
        mcqState.loading = false;
        renderMcqView();
      }
    }

    function normalizePyqBundle(subjects) {
      if (!Array.isArray(subjects)) return [];
      return subjects.flatMap(subject => {
        const papers = Array.isArray(subject.papers) ? subject.papers : [];
        return papers.map(paper => ({
          id: paper.id,
          r2_url: paper.r2_url || paper.url || paper.file_url || "",
          filename: paper.filename || paper.file_name || `${subject.name || "subject"}-pyq.pdf`,
          uploaded_at: paper.uploaded_at || subject.uploaded_at || null,
          pyq_subjects: {
            name: subject.name || subject.subject_name || "Untitled Subject",
            year: subject.year,
            subject_code: subject.subject_code || subject.code || ""
          }
        }));
      }).sort((a, b) => new Date(b.uploaded_at || 0) - new Date(a.uploaded_at || 0));
    }

    async function fetchPyqBundleDirect() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/pyq_get_bundle`, {
        method: "POST",
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          "Content-Type": "application/json",
          Accept: "application/json"
        },
        body: "{}"
      });

      if (!res.ok) {
        const details = await res.text().catch(() => "");
        throw new Error(details || `PYQ bundle failed with status ${res.status}.`);
      }

      return res.json();
    }

    function applyPyqBundle(bundle) {
      pyqState.papers = normalizePyqBundle(bundle);
      pyqState.loaded = true;
      pyqState.loadedAt = Date.now();
      sessionStorage.removeItem("nnrg_pyq_papers_v1");
    }

    async function loadPyqPapers({ force = false } = {}) {
      const isFresh = pyqState.loaded && Date.now() - pyqState.loadedAt < PYQ_LIVE_CACHE_TTL;
      if (pyqState.loading || (!force && isFresh)) {
        renderPyqGrid();
        return;
      }

      pyqState.loading = true;
      pyqState.error = "";
      if (!pyqState.loaded) renderPyqGrid();

      try {
        try {
          const { data: bundle, error: bundleError } = await supabaseClient.rpc("pyq_get_bundle");
          if (!bundleError && Array.isArray(bundle)) {
            applyPyqBundle(bundle);
            return;
          }
        } catch (rpcErr) {
          console.warn("Supabase PYQ bundle RPC failed, trying direct REST RPC.", rpcErr);
        }

        try {
          const bundle = await fetchPyqBundleDirect();
          if (Array.isArray(bundle)) {
            applyPyqBundle(bundle);
            return;
          }
        } catch (directRpcErr) {
          console.warn("Direct PYQ bundle RPC failed, trying legacy table fetch.", directRpcErr);
        }

        const endpoint = `${SUPABASE_URL}/rest/v1/pyq_papers?select=id,r2_url,filename,uploaded_at,pyq_subjects(name,year)&is_active=eq.true&order=uploaded_at.desc`;
        const res = await fetch(endpoint, {
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
            Accept: "application/json"
          }
        });

        if (!res.ok) {
          const details = await res.text().catch(() => "");
          throw new Error(details || "Could not load PYQ papers from Supabase.");
        }

        pyqState.papers = await res.json();
        pyqState.loaded = true;
        pyqState.loadedAt = Date.now();
        sessionStorage.removeItem("nnrg_pyq_papers_v1");
      } catch (err) {
        sessionStorage.removeItem("nnrg_pyq_papers_v1");
        pyqState.error = err.message || "Could not load PYQ papers.";
        return;
      } finally {
        pyqState.loading = false;
        renderPyqGrid();
      }
    }

    function renderPyqGrid() {
      const grid = document.getElementById("pyqGrid");
      const count = document.getElementById("pyqCount");
      const subjectStat = document.getElementById("pyqSubjectStat");
      const yearStat = document.getElementById("pyqYearStat");
      const fourthText = document.getElementById("pyqFourthText");
      const notice = document.getElementById("pyqNotice");
      if (!grid) return;

      const stats = pyqStats();
      if (subjectStat) subjectStat.textContent = stats.subjects;
      if (yearStat) yearStat.textContent = stats.years;
      if (fourthText) fourthText.textContent = stats.hasFourth ? "Year papers live" : "Year uploading soon";
      if (notice) notice.style.display = stats.hasFourth ? "none" : "inline-flex";

      if (pyqState.loading && !pyqState.loaded) {
        grid.innerHTML = Array.from({ length: 6 }).map(() => `<div class="pyq-skeleton"></div>`).join("");
        if (count) count.innerHTML = `Showing <strong>...</strong> subjects`;
        return;
      }

      if (pyqState.error) {
        grid.innerHTML = `<div class="pyq-state">⚠️ ${pyqState.error}</div>`;
        if (count) count.innerHTML = `Showing <strong>0</strong> subjects`;
        return;
      }

      const papers = pyqFilteredPapers();
      if (count) count.innerHTML = `Showing <strong>${papers.length}</strong> subjects`;

      if (!papers.length) {
        grid.innerHTML = `<div class="pyq-state">📭<br>No papers found</div>`;
        return;
      }

      grid.innerHTML = papers.map(paper => {
        const subject = paper.pyq_subjects || {};
        const name = subject.name || "Untitled Subject";
        return `
          <article class="pyq-card">
            <div class="pyq-icon">${pyqIcon(name)}</div>
            <div>
              <h3>${name}</h3>
              <span class="pyq-year">${yearLabel(subject.year)}</span>
            </div>
            <div class="pyq-file">${paper.filename || "previous-year-question.pdf"}</div>
            <button class="pyq-download" type="button" data-pyq-open="${paper.r2_url}" data-pyq-name="${name}">Download PYQ</button>
          </article>
        `;
      }).join("");
    }

    function initPyqView() {
      const searchInput = document.getElementById("pyqSearch");
      if (searchInput) searchInput.value = pyqState.query;
      loadPyqPapers();
    }

    function showToastPop(message) {
      let toast = document.getElementById("toastPop");
      if (!toast) {
        toast = document.createElement("div");
        toast.id = "toastPop";
        toast.className = "toast-pop";
        document.body.appendChild(toast);
      }

      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToastPop.timer);
      showToastPop.timer = setTimeout(() => toast.classList.remove("show"), 2600);
    }

    function updateThemeToggle() {
      const toggle = document.getElementById("themeToggle");
      const current = document.documentElement.getAttribute("data-theme") || "light";
      if (toggle) toggle.textContent = current === "light" ? "☀️ Light" : "🌙 Dark";
    }

    function setSection(id) {
      const safeId = sectionMeta[id] ? id : "dashboard";
      const [title, subtitle] = sectionMeta[safeId];
      pageTitle.textContent = title;
      pageSubtitle.textContent = subtitle;
      renderNav(safeId);
      const renderedSection = safeId === "dashboard"
        ? dashboardTemplate()
        : safeId === "about"
          ? aboutTemplate()
          : safeId === "courses"
            ? coursesTemplate()
            : safeId === "playground"
              ? playgroundTemplate()
              : safeId === "youtube"
                ? youtubeTemplate()
                : safeId === "pyq"
                  ? pyqTemplate()
                  : safeId === "study"
                    ? studyTemplate()
                    : safeId === "programming"
                      ? programmingTemplate()
                      : safeId === "mcq"
                        ? mcqTemplate()
                        : safeId === "leaderboard"
                          ? leaderboardTemplate()
                          : safeId === "scores"
                            ? scoresTemplate()
                            : placeholderTemplate(safeId);
      content.innerHTML = `${renderedSection}${sectionFooterTemplate()}`;
      if (safeId === "study") {
        initStudyView();
        loadStudyMaterials();
      }
      if (safeId === "dashboard") loadNoticeBoard();
      if (safeId === "about") initAboutView();
      if (safeId === "pyq") initPyqView();
      if (safeId === "programming") renderProgrammingCodeBlocks();
      if (safeId === "mcq") initMcqView();
      if (safeId === "leaderboard") loadLeaderboardRows();
      if (safeId === "scores") loadScoresRows();
      document.body.classList.remove("sidebar-open");
      history.replaceState(null, "", `#${safeId}`);
    }

    nav.addEventListener("click", event => {
      const button = event.target.closest("[data-section]");
      if (button) setSection(button.dataset.section);
    });

    content.addEventListener("click", event => {
      const button = event.target.closest("[data-jump]");
      if (button) setSection(button.dataset.jump);

      const studyYear = event.target.closest("[data-study-year]");
      if (studyYear) {
        studyState.year = studyYear.dataset.studyYear;
        content.innerHTML = `${studyTemplate()}${sectionFooterTemplate()}`;
        initStudyView();
      }

      const mcqLanguage = event.target.closest("[data-mcq-language]");
      if (mcqLanguage) openMcqLanguage(mcqLanguage.dataset.mcqLanguage);

      if (event.target.closest("[data-mcq-home]")) {
        mcqState.screen = "languages";
        mcqState.languageId = "";
        mcqState.result = null;
        mcqState.questions = [];
        mcqState.answers = {};
        renderMcqView();
        loadFacultyTests({ force: true });
      }

      if (event.target.closest("[data-mcq-units]")) {
        mcqState.screen = "units";
        mcqState.result = null;
        mcqState.questions = [];
        mcqState.answers = {};
        renderMcqView();
      }

      const mcqUnit = event.target.closest("[data-mcq-unit]");
      if (mcqUnit) {
        loadMcqQuestions({
          languageId: mcqState.languageId,
          unitNo: Number(mcqUnit.dataset.mcqUnit),
          mode: "unit"
        });
      }

      if (event.target.closest("[data-mcq-full-assessment]")) {
        loadMcqQuestions({
          languageId: mcqState.languageId,
          unitNo: 0,
          mode: "full"
        });
      }

      const facultyTest = event.target.closest("[data-mcq-faculty-test]");
      if (facultyTest) {
        const test = mcqState.facultyTests.find(item => item.id === facultyTest.dataset.mcqFacultyTest);
        if (test) {
          loadMcqQuestions({
            languageId: test.language_id,
            unitNo: test.unit_no,
            mode: "faculty",
            testId: test.id
          });
        }
      }

      const questionIndex = event.target.closest("[data-mcq-question-index]");
      if (questionIndex) {
        mcqState.activeQuestion = Number(questionIndex.dataset.mcqQuestionIndex);
        renderMcqView();
      }

      const mcqAnswer = event.target.closest("[data-mcq-answer]");
      if (mcqAnswer) {
        const active = mcqState.questions[mcqState.activeQuestion];
        if (active) {
          mcqState.answers[active.id] = mcqAnswer.dataset.mcqAnswer;
          renderMcqView();
        }
      }

      if (event.target.closest("[data-mcq-prev]")) {
        mcqState.activeQuestion = Math.max(0, mcqState.activeQuestion - 1);
        renderMcqView();
      }

      if (event.target.closest("[data-mcq-next]")) {
        mcqState.activeQuestion = Math.min(mcqState.questions.length - 1, mcqState.activeQuestion + 1);
        renderMcqView();
      }

      if (event.target.closest("[data-mcq-submit]")) {
        const answered = Object.keys(mcqState.answers).length;
        const proceed = answered === mcqState.questions.length || window.confirm(`You answered ${answered}/${mcqState.questions.length}. Submit now?`);
        if (proceed) submitMcqAttempt();
      }

      const adminSelectTest = event.target.closest("[data-admin-select-test]");
      if (adminSelectTest) loadAdminQuestions(adminSelectTest.dataset.adminSelectTest);

      const adminEditQuestion = event.target.closest("[data-admin-edit-question]");
      if (adminEditQuestion) fillAdminQuestionForm(adminEditQuestion.dataset.adminEditQuestion);

      const programmingLanguage = event.target.closest("[data-programming-language]");
      if (programmingLanguage && !programmingLanguage.disabled) {
        programmingState.language = programmingLanguage.dataset.programmingLanguage;
        programmingState.topicIndex = 0;
        programmingState.subtopicIndex = 0;
        renderProgrammingView();
      }

      if (event.target.closest("[data-programming-home]")) {
        programmingState.language = "";
        programmingState.topicIndex = 0;
        programmingState.subtopicIndex = 0;
        renderProgrammingView();
      }

      const programmingTopicButton = event.target.closest("[data-programming-topic]");
      if (programmingTopicButton) {
        programmingState.topicIndex = Number(programmingTopicButton.dataset.programmingTopic);
        programmingState.subtopicIndex = 0;
        renderProgrammingView();
      }

      const programmingSubtopicButton = event.target.closest("[data-programming-subtopic]");
      if (programmingSubtopicButton) {
        const [topicIndex, subtopicIndex] = programmingSubtopicButton.dataset.programmingSubtopic.split(":").map(Number);
        programmingState.topicIndex = topicIndex;
        programmingState.subtopicIndex = subtopicIndex;
        renderProgrammingView();
      }

      const programmingCopy = event.target.closest("[data-copy-programming-code]");
      if (programmingCopy) {
        const code = programmingCodeCache[programmingCopy.dataset.copyProgrammingCode];
        if (code) {
          navigator.clipboard.writeText(code);
          showToastPop(programmingActiveContent().copyMessage);
        }
      }

      const galleryPrev = event.target.closest("[data-gallery-prev]");
      if (galleryPrev) pageGallery(galleryPrev.dataset.galleryPrev, -1);

      const galleryNext = event.target.closest("[data-gallery-next]");
      if (galleryNext) pageGallery(galleryNext.dataset.galleryNext, 1);

      if (event.target.closest("[data-gallery-toggle]")) toggleGalleryAutoplay();

      const lightboxOpen = event.target.closest("[data-lightbox-open]");
      if (lightboxOpen) openLightbox(lightboxOpen.dataset.lightboxOpen, Number(lightboxOpen.dataset.lightboxIndex));

      if (event.target.closest("[data-lightbox-close]")) closeLightbox();
      if (event.target.closest("[data-lightbox-prev]")) moveLightbox(-1);
      if (event.target.closest("[data-lightbox-next]")) moveLightbox(1);

      const track = document.getElementById("facultyTrack");
      if (track && event.target.closest("[data-faculty-left]")) track.scrollBy({ left: -340, behavior: "smooth" });
      if (track && event.target.closest("[data-faculty-right]")) track.scrollBy({ left: 340, behavior: "smooth" });

      const pyqYear = event.target.closest("[data-pyq-year]");
      if (pyqYear) {
        pyqState.year = pyqYear.dataset.pyqYear;
        document.querySelectorAll("[data-pyq-year]").forEach(tab => tab.classList.toggle("active", tab === pyqYear));
        renderPyqGrid();
      }

      const pyqOpen = event.target.closest("[data-pyq-open]");
      if (pyqOpen) {
        showToastPop(`Opening — ${pyqOpen.dataset.pyqName}`);
        window.open(pyqOpen.dataset.pyqOpen, "_blank", "noopener,noreferrer");
      }
    });

    content.addEventListener("submit", event => {
      const adminLogin = event.target.closest("[data-mcq-admin-login]");
      const adminTestForm = event.target.closest("[data-mcq-admin-test-form]");
      const adminQuestionForm = event.target.closest("[data-mcq-admin-question-form]");
      if (!adminLogin && !adminTestForm && !adminQuestionForm) return;
      event.preventDefault();
      if (adminLogin) unlockMcqAdmin(new FormData(adminLogin).get("adminPassword"));
      if (adminTestForm) saveMcqAdminTest(adminTestForm);
      if (adminQuestionForm) saveMcqAdminQuestion(adminQuestionForm);
    });

    content.addEventListener("input", event => {
      if (event.target.id === "studySearch") {
        studyState.query = event.target.value;
        content.innerHTML = `${studyTemplate()}${sectionFooterTemplate()}`;
        initStudyView();
        const input = document.getElementById("studySearch");
        if (input) {
          input.focus();
          input.setSelectionRange(input.value.length, input.value.length);
        }
      }
      if (event.target.id === "studySubject") {
        studyState.subject = event.target.value;
        content.innerHTML = `${studyTemplate()}${sectionFooterTemplate()}`;
        initStudyView();
      }
      if (event.target.id === "pyqSearch") {
        pyqState.query = event.target.value;
        renderPyqGrid();
      }
    });

    document.addEventListener("keydown", event => {
      const box = document.getElementById("aboutLightbox");
      if (!box || !box.classList.contains("open")) return;
      if (event.key === "Escape") closeLightbox();
      if (event.key === "ArrowLeft") moveLightbox(-1);
      if (event.key === "ArrowRight") moveLightbox(1);
    });

    menuToggle.addEventListener("click", () => document.body.classList.add("sidebar-open"));
    overlay.addEventListener("click", () => document.body.classList.remove("sidebar-open"));
    document.getElementById("themeToggle").addEventListener("click", () => {
      const next = (document.documentElement.getAttribute("data-theme") || "light") === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("nnrg_theme", next);
      localStorage.setItem("nnrg_theme_version", portalThemeVersion);
      updateThemeToggle();
    });
    logoutBtn.addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      localStorage.removeItem("nnrg_student");
      window.location.href = "login.html";
    });

    async function startPortal() {
      await (window.nnrgRouteGuardReady || Promise.resolve());
      if (!document.documentElement.classList.contains("portal-authenticated")) return;

      updateThemeToggle();
      setSection(location.hash.replace("#", "") || "dashboard");
      window.addEventListener("hashchange", () => {
        setSection(location.hash.replace("#", "") || "dashboard");
      });
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) refreshActiveLiveContent();
      });
      setupLiveContentUpdates();
    }

    startPortal().catch(() => {
      localStorage.removeItem("nnrg_student");
      window.location.replace("login.html");
    });

    function refreshActiveLiveContent() {
      const section = location.hash.replace("#", "") || "dashboard";
      if (section === "mcq" && mcqState.screen === "languages" && !mcqState.loading) {
        loadMcqLanguages();
        loadFacultyTests({ force: true });
      }
      if (section === "pyq" && !pyqState.loading) {
        loadPyqPapers();
      }
    }

    function setupLiveContentUpdates() {
      if (!supabaseClient.channel) return;
      try {
        supabaseClient
          .channel("portal-live-content")
          .on("postgres_changes", { event: "*", schema: "public", table: "mcq_tests" }, () => {
            sessionStorage.removeItem(MCQ_LANGUAGES_CACHE_KEY);
            sessionStorage.removeItem(MCQ_FACULTY_TESTS_CACHE_KEY);
            if ((location.hash.replace("#", "") || "dashboard") === "mcq" && mcqState.screen === "languages") {
              loadMcqLanguages();
              loadFacultyTests({ force: true });
            }
          })
          .on("postgres_changes", { event: "*", schema: "public", table: "pyq_papers" }, () => {
            if ((location.hash.replace("#", "") || "dashboard") === "pyq") loadPyqPapers({ force: true });
          })
          .on("postgres_changes", { event: "*", schema: "public", table: "pyq_subjects" }, () => {
            if ((location.hash.replace("#", "") || "dashboard") === "pyq") loadPyqPapers({ force: true });
          })
          .subscribe();
      } catch (error) {
        console.warn("Live content refresh will use polling fallback.", error);
      }
    }
  </script>
</body>
</html>
